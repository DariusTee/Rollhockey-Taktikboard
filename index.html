<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rollhockey Taktikboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; display: flex; height: 100vh; overflow: hidden; }
#sidebar { width: 210px; min-width: 210px; background: #16213e; border-right: 1px solid #0f3460; display: flex; flex-direction: column; padding: 10px; gap: 6px; overflow-y: auto; }
#canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 12px; background: #0f0f1a; }
#field { display: block; cursor: crosshair; border-radius: 8px; }
.tool-group { border: 1px solid #0f3460; border-radius: 8px; padding: 8px; background: #1a1a2e; }
.tool-group h3 { font-size: 10px; font-weight: 600; color: #a0aec0; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.tool-btn { width: 100%; padding: 6px 8px; font-size: 12px; font-weight: 500; border: 1px solid #2d3748; border-radius: 6px; background: #2d3748; color: #e2e8f0; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 6px; transition: all 0.15s; margin-bottom: 3px; }
.tool-btn:hover { background: #4a5568; }
.tool-btn.active { background: #185FA5; color: #fff; border-color: #2b7de9; }
.tool-btn:last-child { margin-bottom: 0; }
.frame-row { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
.frame-btn { padding: 4px 8px; font-size: 11px; border: 1px solid #2d3748; border-radius: 4px; background: #2d3748; color: #e2e8f0; cursor: pointer; }
.frame-btn:hover { background: #4a5568; }
#frame-list { display: flex; flex-wrap: wrap; gap: 3px; }
.frame-thumb { width: 30px; height: 44px; border: 1.5px solid #2d3748; border-radius: 3px; cursor: pointer; font-size: 10px; display: flex; align-items: center; justify-content: center; color: #a0aec0; background: #1a1a2e; }
.frame-thumb.cur { border-color: #185FA5; color: #60a5fa; font-weight: 700; }
#status { font-size: 10px; color: #718096; margin-top: 4px; min-height: 14px; }
select { width: 100%; padding: 5px 6px; font-size: 12px; border: 1px solid #2d3748; border-radius: 6px; background: #2d3748; color: #e2e8f0; margin-bottom: 4px; }
label { font-size: 10px; color: #718096; display: block; margin-bottom: 2px; }
#gif-progress { font-size: 11px; color: #fbbf24; display: none; margin-top: 4px; }
.info-tag { font-size: 10px; color: #4a5568; margin-top: 3px; line-height: 1.3; }
.legend { display: flex; flex-direction: column; gap: 3px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #a0aec0; }
.legend-line { width: 24px; height: 3px; border-radius: 2px; }
</style>
</head>
<body>

<div id="sidebar">
  <div class="tool-group">
    <h3>Werkzeug</h3>
    <button class="tool-btn active" id="btn-select" onclick="setTool('select')">&#9654; Auswählen / Ziehen</button>
    <button class="tool-btn" id="btn-run" onclick="setTool('run')"><span style="color:#22c55e">&#10230;</span> Laufpfeil</button>
    <button class="tool-btn" id="btn-pass" onclick="setTool('pass')"><span style="color:#3b82f6">&#10230;</span> Passpfeil</button>
    <button class="tool-btn" id="btn-shoot" onclick="setTool('shoot')"><span style="color:#ef4444">&#10230;</span> Schusspfeil</button>
    <button class="tool-btn" id="btn-ball" onclick="setTool('ball')">&#9675; Ball setzen</button>
    <button class="tool-btn" id="btn-delete" onclick="setTool('delete')">&#10005; Löschen</button>
  </div>

  <div class="tool-group">
    <h3>Legende</h3>
    <div class="legend">
      <div class="legend-item"><div class="legend-line" style="background:#22c55e; border-top: 2px dashed #22c55e; background:none;"></div> Laufen</div>
      <div class="legend-item"><div class="legend-line" style="background:#3b82f6;"></div> Pass</div>
      <div class="legend-item"><div class="legend-line" style="background:#ef4444; border-top: 2px dotted #ef4444; background:none;"></div> Schuss</div>
    </div>
  </div>

  <div class="tool-group">
    <h3>Team A – Blau</h3>
    <div id="team-a-players"></div>
  </div>
  <div class="tool-group">
    <h3>Team B – Rot</h3>
    <div id="team-b-players"></div>
  </div>

  <div class="tool-group">
    <h3>Frames / Animation</h3>
    <div id="frame-list"></div>
    <div class="frame-row">
      <button class="frame-btn" onclick="addFrame()">+ Frame</button>
      <button class="frame-btn" onclick="delFrame()">– Frame</button>
      <button class="frame-btn" id="btn-play" onclick="playAnim()">&#9654; Play</button>
    </div>
    <div id="status"></div>
  </div>

  <div class="tool-group">
    <h3>Export</h3>
    <button class="tool-btn" onclick="exportPNG()">&#8595; PNG exportieren</button>
    <label>GIF Geschwindigkeit</label>
    <select id="gif-delay">
      <option value="200">Schnell (200ms)</option>
      <option value="500" selected>Normal (500ms)</option>
      <option value="900">Langsam (900ms)</option>
    </select>
    <label>Interpolations-Schritte</label>
    <select id="interp-steps">
      <option value="2">2 – wenig</option>
      <option value="4" selected>4 – normal</option>
      <option value="8">8 – sehr flüssig</option>
    </select>
    <button class="tool-btn" onclick="exportGIF()">&#9654; GIF exportieren</button>
    <div id="gif-progress"></div>
    <p class="info-tag">GIF interpoliert Bewegungen automatisch zwischen Frames.</p>
  </div>
</div>

<div id="canvas-area">
  <canvas id="field"></canvas>
</div>

const canvas = document.getElementById('field');
const ctx = canvas.getContext('2d');
let W, H;
let fieldImg = new Image();
let imgLoaded = false;

fieldImg.onload = function() {
  imgLoaded = true;
  // fit to window
  const maxH = window.innerHeight - 40;
  const maxW = window.innerWidth - 230;
  const scale = Math.min(maxW / fieldImg.width, maxH / fieldImg.height, 1);
  W = Math.round(fieldImg.width * scale);
  H = Math.round(fieldImg.height * scale);
  canvas.width = W;
  canvas.height = H;
  frames = [defaultState()];
  currentFrame = 0;
  renderFrameList();
  renderPlayerBtns();
  draw(frames[0]);
};
fieldImg.src = FIELD_IMG_SRC;

let tool = 'select';
let frames = [];
let currentFrame = 0;
let dragTarget = null;
let dragOffX = 0, dragOffY = 0;
let arrowStart = null;
let selectedId = null;
let animTimer = null;

const TEAM_COLORS = {
  A: { field: '#1e40af', gk: '#0ea5e9' },
  B: { field: '#b91c1c', gk: '#f97316' }
};

function mkId() { return Math.random().toString(36).slice(2,8); }

function defaultState() {
  const cx = W/2, cy = H/2;
  return {
    players: [
      { id: mkId(), team: 'A', role: 'gk', x: cx, y: H*0.1, label: 'TW' },
      { id: mkId(), team: 'A', role: 'field', x: cx-W*0.18, y: H*0.25, label: 'A1' },
      { id: mkId(), team: 'A', role: 'field', x: cx, y: H*0.28, label: 'A2' },
      { id: mkId(), team: 'A', role: 'field', x: cx+W*0.18, y: H*0.25, label: 'A3' },
      { id: mkId(), team: 'A', role: 'field', x: cx, y: H*0.42, label: 'A4' },
      { id: mkId(), team: 'B', role: 'gk', x: cx, y: H*0.9, label: 'TW' },
      { id: mkId(), team: 'B', role: 'field', x: cx-W*0.18, y: H*0.75, label: 'B1' },
      { id: mkId(), team: 'B', role: 'field', x: cx, y: H*0.72, label: 'B2' },
      { id: mkId(), team: 'B', role: 'field', x: cx+W*0.18, y: H*0.75, label: 'B3' },
      { id: mkId(), team: 'B', role: 'field', x: cx, y: H*0.58, label: 'B4' },
    ],
    ball: { x: cx, y: cy },
    arrows: []
  };
}

function cloneState(s) { return JSON.parse(JSON.stringify(s)); }

function setTool(t) {
  tool = t;
  arrowStart = null;
  ['select','run','pass','shoot','ball','delete'].forEach(id => {
    const map = { select:'btn-select', run:'btn-run', pass:'btn-pass', shoot:'btn-shoot', ball:'btn-ball', delete:'btn-delete' };
    const el = document.getElementById(map[id]);
    if (el) el.classList.toggle('active', id === t);
  });
  document.getElementById('status').textContent = '';
}

function drawArrow(ctx2, x1, y1, x2, y2, type) {
  const configs = {
    run:   { color: '#22c55e', dash: [8,5], width: 2.5 },
    pass:  { color: '#3b82f6', dash: [],    width: 2.5 },
    shoot: { color: '#ef4444', dash: [4,4], width: 3   }
  };
  const cfg = configs[type] || { color:'#aaa', dash:[], width:2 };
  const dx = x2-x1, dy = y2-y1;
  const len = Math.sqrt(dx*dx+dy*dy);
  if (len < 5) return;
  const ux = dx/len, uy = dy/len;
  const headLen = Math.max(12, len*0.12);
  const angle = Math.atan2(dy, dx);
  ctx2.save();
  ctx2.strokeStyle = cfg.color;
  ctx2.fillStyle = cfg.color;
  ctx2.lineWidth = cfg.width;
  ctx2.setLineDash(cfg.dash);
  ctx2.beginPath();
  ctx2.moveTo(x1, y1);
  ctx2.lineTo(x2 - ux*headLen*0.5, y2 - uy*headLen*0.5);
  ctx2.stroke();
  ctx2.setLineDash([]);
  const a = Math.PI/7;
  ctx2.beginPath();
  ctx2.moveTo(x2, y2);
  ctx2.lineTo(x2-headLen*Math.cos(angle-a), y2-headLen*Math.sin(angle-a));
  ctx2.lineTo(x2-headLen*Math.cos(angle+a), y2-headLen*Math.sin(angle+a));
  ctx2.closePath();
  ctx2.fill();
  ctx2.restore();
}

function drawState(targetCtx, targetCanvas, state) {
  targetCtx.clearRect(0, 0, targetCanvas.width, targetCanvas.height);
  if (imgLoaded) {
    targetCtx.drawImage(fieldImg, 0, 0, targetCanvas.width, targetCanvas.height);
  } else {
    targetCtx.fillStyle = '#4ade80';
    targetCtx.fillRect(0, 0, targetCanvas.width, targetCanvas.height);
  }
  state.arrows.forEach(a => drawArrow(targetCtx, a.x1, a.y1, a.x2, a.y2, a.type));

  // ball
  const b = state.ball;
  const br = Math.max(7, targetCanvas.width * 0.014);
  targetCtx.fillStyle = '#fff';
  targetCtx.strokeStyle = '#111';
  targetCtx.lineWidth = 2;
  targetCtx.beginPath();
  targetCtx.arc(b.x, b.y, br, 0, Math.PI*2);
  targetCtx.fill();
  targetCtx.stroke();
  targetCtx.fillStyle = '#222';
  targetCtx.beginPath();
  targetCtx.arc(b.x-br*0.25, b.y-br*0.25, br*0.32, 0, Math.PI*2);
  targetCtx.fill();

  const pr = Math.max(12, targetCanvas.width * 0.025);
  state.players.forEach(p => {
    const col = p.role === 'gk' ? TEAM_COLORS[p.team].gk : TEAM_COLORS[p.team].field;
    targetCtx.fillStyle = col;
    targetCtx.strokeStyle = selectedId === p.id ? '#fff' : 'rgba(0,0,0,0.6)';
    targetCtx.lineWidth = selectedId === p.id ? 3 : 1.5;
    targetCtx.beginPath();
    if (p.role === 'gk') {
      const s = pr*1.2;
      targetCtx.roundRect(p.x-s, p.y-s, s*2, s*2, 5);
    } else {
      targetCtx.arc(p.x, p.y, pr, 0, Math.PI*2);
    }
    targetCtx.fill();
    targetCtx.stroke();
    targetCtx.fillStyle = '#fff';
    targetCtx.font = `bold ${Math.max(9, pr*0.75)}px system-ui`;
    targetCtx.textAlign = 'center';
    targetCtx.textBaseline = 'middle';
    targetCtx.fillText(p.label, p.x, p.y);
  });
}

function draw(state) { drawState(ctx, canvas, state); }

function getMousePos(e) {
  const r = canvas.getBoundingClientRect();
  return { x: (e.clientX-r.left)*(W/r.width), y: (e.clientY-r.top)*(H/r.height) };
}

function hitPlayer(state, mx, my) {
  const r = Math.max(14, W*0.028);
  return state.players.find(p => Math.hypot(p.x-mx, p.y-my) < r);
}
function hitBall(state, mx, my) { return Math.hypot(state.ball.x-mx, state.ball.y-my) < 14; }

canvas.addEventListener('mousedown', e => {
  const {x,y} = getMousePos(e);
  const st = frames[currentFrame];
  if (tool === 'select') {
    const p = hitPlayer(st, x, y);
    if (p) { dragTarget={type:'player',id:p.id}; dragOffX=x-p.x; dragOffY=y-p.y; selectedId=p.id; renderPlayerBtns(); draw(st); return; }
    if (hitBall(st, x, y)) { dragTarget={type:'ball'}; dragOffX=x-st.ball.x; dragOffY=y-st.ball.y; return; }
    selectedId=null; draw(st);
  }
  if (tool === 'ball') { st.ball={x,y}; draw(st); return; }
  if (tool === 'delete') {
    const idx = st.arrows.findIndex(a => Math.hypot((a.x1+a.x2)/2-x,(a.y1+a.y2)/2-y) < 25);
    if (idx>=0) { st.arrows.splice(idx,1); draw(st); }
    return;
  }
  if (['run','pass','shoot'].includes(tool)) {
    arrowStart={x,y};
    document.getElementById('status').textContent = 'Zielpunkt klicken oder ziehen…';
  }
});

canvas.addEventListener('mousemove', e => {
  const {x,y} = getMousePos(e);
  const st = frames[currentFrame];
  if (dragTarget) {
    if (dragTarget.type==='player') {
      const p = st.players.find(p=>p.id===dragTarget.id);
      if(p){p.x=x-dragOffX;p.y=y-dragOffY;draw(st);}
    } else { st.ball.x=x-dragOffX; st.ball.y=y-dragOffY; draw(st); }
  }
  if (arrowStart && ['run','pass','shoot'].includes(tool)) {
    draw(st);
    drawArrow(ctx, arrowStart.x, arrowStart.y, x, y, tool);
  }
});

canvas.addEventListener('mouseup', e => {
  const {x,y} = getMousePos(e);
  const st = frames[currentFrame];
  if (dragTarget) { dragTarget=null; return; }
  if (arrowStart && ['run','pass','shoot'].includes(tool)) {
    if (Math.hypot(x-arrowStart.x, y-arrowStart.y)>15) {
      st.arrows.push({x1:arrowStart.x,y1:arrowStart.y,x2:x,y2:y,type:tool});
    }
    arrowStart=null;
    document.getElementById('status').textContent='';
    draw(st);
  }
});

function renderFrameList() {
  const div = document.getElementById('frame-list');
  div.innerHTML='';
  frames.forEach((f,i) => {
    const el = document.createElement('div');
    el.className='frame-thumb'+(i===currentFrame?' cur':'');
    el.textContent=i+1;
    el.onclick=()=>{currentFrame=i;renderFrameList();draw(frames[i]);renderPlayerBtns();};
    div.appendChild(el);
  });
}

function renderPlayerBtns() {
  ['A','B'].forEach(t => {
    const div=document.getElementById(`team-${t==='A'?'a':'b'}-players`);
    div.innerHTML='';
    frames[currentFrame].players.filter(p=>p.team===t).forEach(p=>{
      const b=document.createElement('button');
      b.className='tool-btn';
      const col=p.role==='gk'?TEAM_COLORS[t].gk:TEAM_COLORS[t].field;
      b.style.cssText=`background:${col};color:#fff;border-color:transparent;`;
      b.textContent=p.label+(p.role==='gk'?' (TW)':'');
      b.onclick=()=>{selectedId=p.id;setTool('select');draw(frames[currentFrame]);};
      div.appendChild(b);
    });
  });
}

function addFrame() {
  const newF=cloneState(frames[currentFrame]);
  newF.arrows=[];
  frames.splice(currentFrame+1,0,newF);
  currentFrame++;
  renderFrameList();draw(frames[currentFrame]);renderPlayerBtns();
}

function delFrame() {
  if(frames.length<=1)return;
  frames.splice(currentFrame,1);
  if(currentFrame>=frames.length)currentFrame=frames.length-1;
  renderFrameList();draw(frames[currentFrame]);
}

function playAnim() {
  if(animTimer){clearInterval(animTimer);animTimer=null;document.getElementById('btn-play').textContent='▶ Play';return;}
  let fi=0;
  document.getElementById('btn-play').textContent='⏹ Stop';
  animTimer=setInterval(()=>{
    currentFrame=fi%frames.length;
    renderFrameList();draw(frames[currentFrame]);
    fi++;
  },parseInt(document.getElementById('gif-delay').value));
}

function exportPNG() {
  const off=document.createElement('canvas');
  off.width=W;off.height=H;
  const ctx2=off.getContext('2d');
  drawState(ctx2,off,frames[currentFrame]);
  const a=document.createElement('a');
  a.download=`rollhockey_frame${currentFrame+1}.png`;
  a.href=off.toDataURL('image/png');
  a.click();
}

function lerpState(s1,s2,t) {
  const out=cloneState(s1);
  out.players=s1.players.map((p,i)=>{
    const p2=s2.players[i];
    return{...p,x:p.x+(p2.x-p.x)*t,y:p.y+(p2.y-p.y)*t};
  });
  out.ball={x:s1.ball.x+(s2.ball.x-s1.ball.x)*t,y:s1.ball.y+(s2.ball.y-s1.ball.y)*t};
  out.arrows=t<0.5?s1.arrows:s2.arrows;
  return out;
}

async function exportGIF() {
  const delay = parseInt(document.getElementById('gif-delay').value);
  const steps = parseInt(document.getElementById('interp-steps').value);
  const prog = document.getElementById('gif-progress');

  prog.style.display = 'block';
  prog.textContent = 'GIF wird erstellt…';

  const off = document.createElement('canvas');
  off.width = W;
  off.height = H;
  const ctx2 = off.getContext('2d');

  const gif = new GIF({
    workers: 2,
    quality: 8,
    width: W,
    height: H,
    workerScript: './gif.worker.js'
  });

  gif.on('progress', p => {
    prog.textContent = `Encoding: ${Math.round(p * 100)}%`;
  });

  gif.on('finished', blob => {
    prog.textContent = '✓ Fertig! Download startet…';

    const url = URL.createObjectURL(blob);

    const a = document.createElement('a');
    a.href = url;
    a.download = 'rollhockey_spielzug.gif';
    a.click();

    URL.revokeObjectURL(url);

    setTimeout(() => {
      prog.style.display = 'none';
    }, 3000);
  });

  gif.on('abort', () => {
    prog.textContent = 'GIF Export abgebrochen';
  });

  drawState(ctx2, off, frames[0]);
  gif.addFrame(ctx2, { copy: true, delay });

  for (let i = 0; i < frames.length - 1; i++) {
    const s1 = frames[i];
    const s2 = frames[i + 1];

    for (let step = 1; step <= steps; step++) {
      const t = step / (steps + 1);

      drawState(ctx2, off, lerpState(s1, s2, t));

      gif.addFrame(ctx2, {
        copy: true,
        delay: Math.round(delay / (steps + 1))
      });
    }

    drawState(ctx2, off, s2);

    gif.addFrame(ctx2, {
      copy: true,
      delay
    });
  }

  gif.render();
}
</script>
